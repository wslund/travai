services:
  postgres:
    image: postgres:16-alpine
    container_name: travai-postgres
    environment:
      POSTGRES_USER: travai
      POSTGRES_PASSWORD: travai
      POSTGRES_DB: travai
    ports:
      - "5432:5432"
    volumes:
      - travai-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travai -d travai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  travai-pgdata:
